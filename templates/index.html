<!DOCTYPE html>
<html>
<head>
    <title>مركز الزهراء الطبي</title>
</head>
<body>

<h2>تسجيل مريض</h2>

<form method="post" action="/add">
    <input name="name" placeholder="اسم المريض">
    <input name="phone" placeholder="رقم الهاتف">
    <button type="submit">حفظ</button>
</form>

<h2>المرضى</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>الاسم</th>
    <th>الهاتف</th>
</tr>

{% for p in patients %}
<tr>
    <td>{{p[0]}}</td>
    <td>{{p[1]}}</td>
    <td>{{p[2]}}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
