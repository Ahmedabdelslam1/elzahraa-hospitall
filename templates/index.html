<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>مركز الزهراء الطبي</title>
</head>

<body>

<h2>➕ مريض جديد</h2>
<form method="post" action="/add_patient">
<input name="name" placeholder="اسم المريض">
<input name="phone" placeholder="الهاتف">
<button>حفظ</button>
</form>

<h2>👨‍⚕️ طبيب</h2>
<form method="post" action="/add_doctor">
<input name="name" placeholder="اسم الطبيب">
<input name="spec" placeholder="التخصص">
<input name="price" placeholder="سعر الكشف">
<button>حفظ</button>
</form>

<h2>📋 تسجيل كشف</h2>
<form method="post" action="/add_visit">
<select name="patient">
{% for p in patients %}
<option value="{{p[0]}}">{{p[1]}}</option>
{% endfor %}
</select>

<select name="doctor">
{% for d in doctors %}
<option value="{{d[0]}}">{{d[1]}}</option>
{% endfor %}
</select>

<input name="diagnosis" placeholder="التشخيص">
<input name="treatment" placeholder="العلاج">
<button>تسجيل</button>
</form>

<h2>🧾 الزيارات</h2>
<table border="1">
<tr>
<th>رقم</th><th>مريض</th><th>طبيب</th><th>انتظار</th>
</tr>

{% for v in visits %}
<tr>
<td>{{v[0]}}</td>
<td>{{v[1]}}</td>
<td>{{v[2]}}</td>
<td>{{v[4]}}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
