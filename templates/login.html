<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0d6efd, #0dcaf0);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

.login-box h2 {
    margin-bottom: 20px;
}

.input-group {
    margin: 15px 0;
    text-align: right;
}

.input-group input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #0d6efd;
}

.btn {
    width: 100%;
    padding: 12px;
    border: none;
    background: #0d6efd;
    color: white;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #0b5ed7;
}

.logo {
    font-size: 40px;
    margin-bottom: 10px;
}

.footer-text {
    margin-top: 15px;
    font-size: 13px;
    color: #777;
}
</style>

</head>

<body>

<div class="login-box">

    <div class="logo">🏥</div>
    <h2>تسجيل الدخول</h2>

    <form method="POST" action="/login">

        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" name="password" required>
        </div>

        <button class="btn">دخول</button>

    </form>

    <div class="footer-text">
        مستوصف الزهراء - نظام الإدارة الطبية
    </div>

</div>

</body>
</html>
